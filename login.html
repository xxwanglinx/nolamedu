<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoLamEdu - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a href="index.html" class="brand"><span>N</span>NoLamEdu</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="courses.html">Courses</a>
        <a href="contact.html">Contact</a>
        <span id="auth-links"></span>
      </nav>
    </header>

    <section class="hero auth-hero">
      <div class="hero-copy">
        <span class="section-badge">Welcome back</span>
        <h1>Sign in to your learning dashboard.</h1>
        <p>Access saved courses, progress details, and student resources from your account.</p>
      </div>
      <div class="auth-card">
        <h2>Login</h2>
        <form id="login-form" class="auth-form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />

          <button type="submit" class="button">Sign in</button>
          <p id="login-message" class="auth-message"></p>
        </form>
        <p class="auth-note">New here? <a href="register.html">Create an account</a>.</p>
      </div>
    </section>

    <footer>
      &copy; 2026 NoLamEdu. All rights reserved.
    </footer>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoLamEdu - Login</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a href="index.html" class="brand"><span>N</span>NoLamEdu</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="courses.html">Courses</a>
        <a href="contact.html">Contact</a>
        <span id="auth-links"></span>
      </nav>
    </header>

    <section class="hero auth-hero">
      <div class="hero-copy">
        <span class="section-badge">Welcome back</span>
        <h1>Sign in to your learning dashboard.</h1>
        <p>Access saved courses, progress details, and student resources from your account.</p>
      </div>
      <div class="auth-card">
        <h2>Login</h2>
        <form id="login-form" class="auth-form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />

          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required />

          <button type="submit" class="button">Sign in</button>
          <p id="login-message" class="auth-message"></p>
        </form>
        <p><a href="#" id="forgot-link">Forgot password?</a></p>

        <div id="forgot-panel" style="display:none; margin-top:12px;">
          <form id="forgot-form" class="auth-form" style="display:none;">
            <label for="forgot-email">Email</label>
            <input type="email" id="forgot-email" name="forgot-email" placeholder="you@example.com" required />
            <button type="submit" class="button">Send reset code</button>
            <p id="forgot-message" class="auth-message"></p>
          </form>

          <form id="reset-form" class="auth-form" style="display:none; margin-top:12px;">
            <label for="reset-email">Email</label>
            <input type="email" id="reset-email" name="reset-email" placeholder="you@example.com" required />

            <label for="reset-token">Reset code</label>
            <input type="text" id="reset-token" name="reset-token" placeholder="6-digit code" required />

            <label for="reset-password">New password</label>
            <input type="password" id="reset-password" name="reset-password" placeholder="New password" required />

            <label for="reset-confirm">Confirm new password</label>
            <input type="password" id="reset-confirm" name="reset-confirm" placeholder="Confirm password" required />

            <button type="submit" class="button">Reset password</button>
            <p id="reset-message" class="auth-message"></p>
          </form>
        </div>
        </form>
        <p class="auth-note">New here? <a href="register.html">Create an account</a>.</p>
      </div>
    </section>

    <footer>
      &copy; 2026 NoLamEdu. All rights reserved.
    </footer>
  </main>
</body>
</html>

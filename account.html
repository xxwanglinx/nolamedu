<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NoLamEdu - My Account</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="auth.js" defer></script>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a href="index.html" class="brand"><span>N</span>NoLamEdu</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="courses.html">Courses</a>
        <a href="contact.html">Contact</a>
        <span id="auth-links"></span>
      </nav>
    </header>

    <section class="hero auth-hero">
      <div class="hero-copy">
        <span class="section-badge">Student dashboard</span>
        <h1>Your learning account is ready.</h1>
        <p>Manage your profile, return to courses, and review your progress from one place.</p>
      </div>
      <div class="auth-card">
        <h2>Account details</h2>
        <p id="account-welcome" class="account-welcome"></p>

        <form id="account-form" class="auth-form">
          <label for="account-email">Email</label>
          <input type="email" id="account-email" name="account-email" readonly />

          <label for="account-name">Full name</label>
          <input type="text" id="account-name" name="account-name" />

          <label for="account-display">Display name</label>
          <input type="text" id="account-display" name="account-display" />

          <button type="submit" class="button">Save profile</button>
          <p id="account-message" class="auth-message"></p>
        </form>

        <button id="account-logout" class="button">Logout</button>
      </div>
    </section>

    <footer>
      &copy; 2026 NoLamEdu. All rights reserved.
    </footer>
  </main>
</body>
</html>
